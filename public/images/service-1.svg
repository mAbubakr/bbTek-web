<svg width="520" height="480" viewBox="0 0 520 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="520" height="480" fill="#F3F4F6" rx="12"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(160, 80)">
    <path d="M100 40L200 40L200 60L100 60Z" fill="#3B82F6" opacity="0.2"/>
    <path d="M100 40L150 20L200 40L150 60Z" fill="#3B82F6"/>
    <circle cx="150" cy="40" r="8" fill="#1E40AF"/>
    <path d="M100 60L150 80L200 60" stroke="#3B82F6" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Books Stack -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="120" height="20" fill="#10B981" rx="4"/>
    <rect x="0" y="25" width="120" height="20" fill="#3B82F6" rx="4"/>
    <rect x="0" y="50" width="120" height="20" fill="#8B5CF6" rx="4"/>
    <line x1="60" y1="0" x2="60" y2="70" stroke="#6B7280" stroke-width="2"/>
  </g>
  
  <!-- Laptop/Computer -->
  <g transform="translate(280, 220)">
    <rect x="0" y="0" width="160" height="100" fill="#1F2937" rx="8"/>
    <rect x="10" y="10" width="140" height="70" fill="#111827"/>
    <rect x="0" y="100" width="160" height="8" fill="#374151" rx="4"/>
    <rect x="60" y="108" width="40" height="4" fill="#4B5563" rx="2"/>
  </g>
  
  <!-- Light Bulb (Ideas/Knowledge) -->
  <g transform="translate(380, 100)">
    <circle cx="40" cy="40" r="30" fill="#FCD34D" opacity="0.3"/>
    <path d="M40 10 Q50 20 55 30 Q60 40 55 50 Q50 60 40 65 Q30 60 25 50 Q20 40 25 30 Q30 20 40 10" fill="#FCD34D"/>
    <rect x="35" y="65" width="10" height="15" fill="#D97706" rx="2"/>
    <path d="M30 80 Q35 85 40 85 Q45 85 50 80" stroke="#FCD34D" stroke-width="3" fill="none"/>
  </g>
  
  <!-- People/Students -->
  <g transform="translate(120, 320)">
    <circle cx="30" cy="20" r="15" fill="#6366F1"/>
    <rect x="20" y="35" width="20" height="30" fill="#6366F1" rx="10"/>
    <circle cx="90" cy="20" r="15" fill="#EC4899"/>
    <rect x="80" y="35" width="20" height="30" fill="#EC4899" rx="10"/>
  </g>
  
  <!-- Text/Title -->
  <text x="260" y="450" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1F2937" text-anchor="middle">Education &amp; Training</text>
</svg>


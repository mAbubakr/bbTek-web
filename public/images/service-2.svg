<svg width="520" height="480" viewBox="0 0 520 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="520" height="480" fill="#F3F4F6" rx="12"/>
  
  <!-- Network Nodes -->
  <g transform="translate(100, 100)">
    <!-- Central Hub -->
    <circle cx="160" cy="140" r="40" fill="#3B82F6" opacity="0.2"/>
    <circle cx="160" cy="140" r="25" fill="#3B82F6"/>
    <circle cx="160" cy="140" r="8" fill="#1E40AF"/>
    
    <!-- Connected Nodes -->
    <circle cx="60" cy="80" r="20" fill="#10B981"/>
    <line x1="60" y1="80" x2="160" y2="140" stroke="#6B7280" stroke-width="3"/>
    
    <circle cx="260" cy="80" r="20" fill="#10B981"/>
    <line x1="260" y1="80" x2="160" y2="140" stroke="#6B7280" stroke-width="3"/>
    
    <circle cx="60" cy="200" r="20" fill="#10B981"/>
    <line x1="60" y1="200" x2="160" y2="140" stroke="#6B7280" stroke-width="3"/>
    
    <circle cx="260" cy="200" r="20" fill="#10B981"/>
    <line x1="260" y1="200" x2="160" y2="140" stroke="#6B7280" stroke-width="3"/>
    
    <!-- Additional Connections -->
    <line x1="60" y1="80" x2="260" y2="80" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="60" y1="200" x2="260" y2="200" stroke="#E5E7EB" stroke-width="2" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Security Shield -->
  <g transform="translate(320, 200)">
    <path d="M80 20 Q80 10 90 10 L110 10 Q120 10 120 20 L120 50 Q120 70 100 85 Q80 70 80 50 Z" fill="#10B981" opacity="0.2"/>
    <path d="M80 20 Q80 10 90 10 L110 10 Q120 10 120 20 L120 50 Q120 70 100 85 Q80 70 80 50 Z" stroke="#10B981" stroke-width="4" fill="none"/>
    <path d="M90 45 L95 50 L110 35" stroke="#10B981" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Server Rack -->
  <g transform="translate(60, 280)">
    <rect x="0" y="0" width="200" height="120" fill="#1F2937" rx="4"/>
    <rect x="10" y="10" width="180" height="20" fill="#374151" rx="2"/>
    <rect x="10" y="40" width="180" height="20" fill="#374151" rx="2"/>
    <rect x="10" y="70" width="180" height="20" fill="#374151" rx="2"/>
    <rect x="10" y="100" width="180" height="10" fill="#10B981" rx="2"/>
    <!-- LED Indicators -->
    <circle cx="190" cy="20" r="3" fill="#10B981"/>
    <circle cx="190" cy="50" r="3" fill="#10B981"/>
    <circle cx="190" cy="80" r="3" fill="#10B981"/>
  </g>
  
  <!-- Lock Icon -->
  <g transform="translate(300, 320)">
    <rect x="40" y="50" width="40" height="30" fill="#6366F1" rx="4"/>
    <path d="M50 50 Q50 30 60 30 L80 30 Q90 30 90 50" stroke="#6366F1" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="60" cy="65" r="3" fill="#FFFFFF"/>
  </g>
  
  <!-- Text/Title -->
  <text x="260" y="450" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1F2937" text-anchor="middle">Network &amp; Security</text>
</svg>

